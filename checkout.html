</header>

<section class="checkout-container">

<h2>Checkout</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="07XXXXXXXX" required>

<label>Delivery Address</label>
<textarea placeholder="Enter delivery address" required></textarea>

<label>County</label>

<select required>

<option>Select County</option>
<option>Nairobi</option>
<option>Kiambu</option>
<option>Nakuru</option>
<option>Mombasa</option>
<option>Kisumu</option>

</select>

<label>Payment Method</label>

<input type="radio" name="payment"> M-Pesa

<input type="radio" name="payment"> Visa / MasterCard

<input type="radio" name="payment"> Cash on Delivery

<br><br>

<h3>Order Summary</h3>

<p>Classic T-Shirt × 1 - KSh 1,200</p>

<p>Blue Jeans × 2 - KSh 5,600</p>

<p>Leather Jacket × 1 - KSh 5,500</p>

<hr>

<h3>Total: KSh 12,300</h3>

<button type="submit">
Place Order
</button>

</form>

</section>
